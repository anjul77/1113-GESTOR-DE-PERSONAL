<script>
let rol = "";
let usuarioNombre = "";

/* 👑 ADMINS */
const ADMINS = [
  "admin@empresa.com"
];

/* STORAGE */
function getUsuarios(){
  return JSON.parse(localStorage.getItem("usuarios")) || [];
}
function setUsuarios(data){
  localStorage.setItem("usuarios", JSON.stringify(data));
}
function getAsistencias(){
  return JSON.parse(localStorage.getItem("asistencias")) || [];
}
function setAsistencias(data){
  localStorage.setItem("asistencias", JSON.stringify(data));
}

/* INICIO */
window.onload = () => abrir("login");

/* ANIMACIÓN */
function abrirConDelay(p){
  document.body.style.opacity="0.4";
  setTimeout(()=>{
    document.body.style.opacity="1";
    abrir(p);
  },500);
}

/* NAV */
function abrir(p){
  document.querySelectorAll('.pantalla').forEach(x=>x.style.display="none");
  const el=document.getElementById(p);
  if(el) el.style.display="block";

  if(p==="menu") verificarPermisos();
  if(p==="empleados") mostrarUsuario();
}

/* REGISTRO */
function registrarUsuario(){
  let u = usuario.value.trim();
  let c = nuevoCorreo.value.trim();
  let p = nuevoPassword.value.trim();

  if(!u || !c || !p){
    alert("Completa todos los campos");
    return;
  }

  let usuarios = getUsuarios();

  if(usuarios.find(x=>x.correo===c)){
    alert("Este correo ya existe");
    return;
  }

  let rolAsignado = ADMINS.includes(c) ? "admin" : "empleado";

  usuarios.push({usuario:u, correo:c, pass:p, rol:rolAsignado});
  setUsuarios(usuarios);

  alert("✅ Usuario registrado correctamente");

  // limpiar
  usuario.value="";
  nuevoCorreo.value="";
  nuevoPassword.value="";

  abrir("login");
}

/* LOGIN */
function login(){
  let c = correo.value.trim();
  let p = password.value.trim();

  if(!c || !p){
    alert("Ingresa correo y contraseña");
    return;
  }

  let user = getUsuarios().find(x=>x.correo===c && x.pass===p);

  if(!user){
    alert("Correo o contraseña incorrectos");
    return;
  }

  rol = user.rol;
  usuarioNombre = user.usuario;

  // limpiar
  correo.value="";
  password.value="";

  abrir("menu");
}

/* LOGOUT */
function logout(){
  rol="";
  usuarioNombre="";
  abrir("login");
}

/* PERMISOS */
function verificarPermisos(){
  const btn = document.getElementById("btnAdmin");
  if(btn){
    btn.style.display = rol==="admin" ? "inline-block" : "none";
  }
}

/* USUARIO */
function mostrarUsuario(){
  usuarioActivo.innerText = usuarioNombre + " (" + rol + ")";
}

/* ASISTENCIA */
function registrarEmpleado(){
  if(rol!=="admin"){
    alert("No tienes permisos");
    return;
  }

  let c = codigoEmpleado.value.trim();
  if(!c){
    alert("Ingresa un código");
    return;
  }

  let a = getAsistencias();

  a.push({
    codigo:c,
    usuario:usuarioNombre,
    fecha:new Date().toLocaleDateString(),
    entrada:new Date().toLocaleTimeString(),
    salida:""
  });

  setAsistencias(a);

  codigoEmpleado.value="";
  alert("✅ Entrada registrada");
}

function registrarSalida(){
  let c = codigoEmpleado.value.trim();
  if(!c){
    alert("Ingresa un código");
    return;
  }

  let a = getAsistencias();

  let r = a.find(x=>x.codigo===c && x.salida==="");

  if(!r){
    alert("No hay entrada registrada");
    return;
  }

  r.salida = new Date().toLocaleTimeString();

  setAsistencias(a);

  codigoEmpleado.value="";
  alert("✅ Salida registrada");
}

/* TABLAS */
function mostrarEmpleados(){
  let datos = getAsistencias();

  if(datos.length===0){
    tabla.innerHTML = "<tr><td colspan='5'>Sin registros</td></tr>";
    return;
  }

  tabla.innerHTML = datos.map(x=>`
    <tr>
      <td>${x.codigo}</td>
      <td>${x.usuario}</td>
      <td>${x.fecha}</td>
      <td>${x.entrada}</td>
      <td>${x.salida || "-"}</td>
    </tr>
  `).join("");
}

function cargarUsuarios(){
  let datos = getUsuarios();

  if(datos.length===0){
    tablaUsuarios.innerHTML = "<tr><td colspan='3'>Sin usuarios</td></tr>";
    return;
  }

  tablaUsuarios.innerHTML = datos.map(x=>`
    <tr>
      <td>${x.usuario}</td>
      <td>${x.correo}</td>
      <td>${x.rol}</td>
    </tr>
  `).join("");
}

function cargarAsistencias(){
  let datos = getAsistencias();

  if(datos.length===0){
    tablaAdmin.innerHTML = "<tr><td colspan='5'>Sin registros</td></tr>";
    return;
  }

  tablaAdmin.innerHTML = datos.map(x=>`
    <tr>
      <td>${x.codigo}</td>
      <td>${x.usuario}</td>
      <td>${x.fecha}</td>
      <td>${x.entrada}</td>
      <td>${x.salida || "-"}</td>
    </tr>
  `).join("");
}
</script>
