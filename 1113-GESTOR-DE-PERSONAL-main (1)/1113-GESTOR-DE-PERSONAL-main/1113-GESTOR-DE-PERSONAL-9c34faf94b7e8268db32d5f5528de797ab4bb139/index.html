<script>
let rol = "";
let usuarioNombre = "";

/* 👑 ADMINS */
const ADMINS = [
  "lorerario@empresa.com" // 👈 ahora este es admin
];

/* LOADER */
function mostrarLoader() {
  let loader = document.createElement("div");
  loader.id = "loader";
  loader.innerHTML = "Cargando...";
  loader.style.position = "fixed";
  loader.style.top = "0";
  loader.style.left = "0";
  loader.style.width = "100%";
  loader.style.height = "100%";
  loader.style.background = "rgba(0,0,0,0.5)";
  loader.style.color = "white";
  loader.style.display = "flex";
  loader.style.alignItems = "center";
  loader.style.justifyContent = "center";
  loader.style.fontSize = "24px";
  loader.style.zIndex = "9999";
  document.body.appendChild(loader);
}

function ocultarLoader() {
  let loader = document.getElementById("loader");
  if (loader) loader.remove();
}

/* STORAGE */
function getUsuarios(){
  return JSON.parse(localStorage.getItem("usuarios")) || [];
}
function setUsuarios(data){
  localStorage.setItem("usuarios", JSON.stringify(data));
}
function getAsistencias(){
  return JSON.parse(localStorage.getItem("asistencias")) || [];
}
function setAsistencias(data){
  localStorage.setItem("asistencias", JSON.stringify(data));
}

/* INICIO */
window.onload = () => abrir("login");

/* DELAY CON LOADER */
function abrirConDelay(p){
  mostrarLoader();
  setTimeout(()=>{
    ocultarLoader();
    abrir(p);
  },800);
}

/* NAV */
function abrir(p){
  document.querySelectorAll('.pantalla').forEach(x=>x.style.display="none");
  const el=document.getElementById(p);
  if(el) el.style.display="block";

  if(p==="menu") verificarPermisos();
  if(p==="empleados") mostrarUsuario();
}

/* REGISTRO */
function registrarUsuario(){
  let u=usuario.value.trim();
  let c=nuevoCorreo.value.trim();
  let p=nuevoPassword.value.trim();

  if(!u||!c||!p) return alert("Completa todos los campos");

  let usuarios=getUsuarios();

  if(usuarios.find(x=>x.correo===c))
    return alert("Este correo ya está registrado");

  let rolAsignado = ADMINS.includes(c) ? "admin" : "empleado";

  usuarios.push({usuario:u,correo:c,pass:p,rol:rolAsignado});
  setUsuarios(usuarios);

  alert("✅ Usuario registrado exitosamente");

  // limpiar inputs
  usuario.value="";
  nuevoCorreo.value="";
  nuevoPassword.value="";

  abrirConDelay("login");
}

/* LOGIN */
function login(){
  let c=correo.value.trim();
  let p=password.value.trim();

  if(!c||!p) return alert("Ingresa correo y contraseña");

  mostrarLoader();

  setTimeout(()=>{
    let user=getUsuarios().find(x=>x.correo===c&&x.pass===p);

    if(!user){
      ocultarLoader();
      return alert("Correo o contraseña incorrectos");
    }

    rol=user.rol;
    usuarioNombre=user.usuario;

    // limpiar inputs
    correo.value="";
    password.value="";

    ocultarLoader();
    abrir("menu");
  },800);
}

/* LOGOUT */
function logout(){
  rol=""; usuarioNombre="";
  abrir("login");
}

/* PERMISOS */
function verificarPermisos(){
  const btn=document.getElementById("btnAdmin");
  if(btn) btn.style.display=rol==="admin"?"inline-block":"none";
}

/* USUARIO */
function mostrarUsuario(){
  usuarioActivo.innerText=usuarioNombre+" ("+rol+")";
}

/* ASISTENCIA */
function registrarEmpleado(){
  if(rol!=="admin") return alert("No tienes permisos");

  let c=codigoEmpleado.value.trim();
  if(!c) return alert("Ingresa código");

  let a=getAsistencias();

  a.push({
    codigo:c,
    usuario:usuarioNombre,
    fecha:new Date().toLocaleDateString(),
    entrada:new Date().toLocaleTimeString(),
    salida:""
  });

  setAsistencias(a);

  codigoEmpleado.value="";
  alert("✅ Entrada registrada");
}

function registrarSalida(){
  let c=codigoEmpleado.value.trim();
  if(!c) return alert("Ingresa código");

  let a=getAsistencias();

  let r=a.find(x=>x.codigo===c&&x.salida==="");

  if(!r) return alert("No hay entrada registrada");

  r.salida=new Date().toLocaleTimeString();

  setAsistencias(a);

  codigoEmpleado.value="";
  alert("✅ Salida registrada");
}

/* TABLAS */
function mostrarEmpleados(){
  tabla.innerHTML=getAsistencias().map(x=>`
    <tr>
      <td>${x.codigo}</td>
      <td>${x.usuario}</td>
      <td>${x.fecha}</td>
      <td>${x.entrada}</td>
      <td>${x.salida||"-"}</td>
    </tr>
  `).join("");
}

function cargarUsuarios(){
  tablaUsuarios.innerHTML=getUsuarios().map(x=>`
    <tr>
      <td>${x.usuario}</td>
      <td>${x.correo}</td>
      <td>${x.rol}</td>
    </tr>
  `).join("");
}

function cargarAsistencias(){
  tablaAdmin.innerHTML=getAsistencias().map(x=>`
    <tr>
      <td>${x.codigo}</td>
      <td>${x.usuario}</td>
      <td>${x.fecha}</td>
      <td>${x.entrada}</td>
      <td>${x.salida||"-"}</td>
    </tr>
  `).join("");
}
</script>
