<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lorteck</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eef2f3;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    .btn { background: #007BFF; }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }

    .pantalla {
      display: none;
    }

    #login {
      display: block;
    }

    .panel {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #007BFF;
      color: white;
    }
  </style>
</head>
<body>

  <!-- 🔐 LOGIN -->
  <div id="login" class="pantalla">
    <div class="panel">
      <h2>🔷 Lorteck</h2>
      <h3>Iniciar Sesión</h3>

      <input type="email" id="correo" placeholder="Correo empresa"><br>
      <input type="password" id="password" placeholder="Contraseña"><br>

      <button class="btn" onclick="login()">Iniciar sesión</button>
      <button class="btn" onclick="abrir('registro')">Registrarse</button>

      <p id="mensajeLogin"></p>
    </div>
  </div>

  <!-- 📝 REGISTRO -->
  <div id="registro" class="pantalla">
    <div class="panel">
      <h3>Crear cuenta</h3>

      <input type="email" id="nuevoCorreo" placeholder="Correo empresa"><br>
      <input type="password" id="nuevoPassword" placeholder="Contraseña"><br>

      <button class="btn" onclick="registrarUsuario()">Crear cuenta</button>
      <button class="btn" onclick="abrir('login')">Volver</button>

      <p id="mensajeRegistro"></p>
    </div>
  </div>

  <!-- 🟦 MENÚ -->
  <div id="menu" class="pantalla">
    <h2>🔷 Lorteck - Sistema de Empleados</h2>

    <button class="btn" onclick="abrir('empleados')">Empleados</button>
    <button class="btn" onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- 👨‍💼 EMPLEADOS -->
  <div id="empleados" class="pantalla">
    <button class="btn" onclick="volver()">⬅ Volver</button>

    <div class="panel">
      <h3>Registro de Empleados</h3>

      <input type="text" id="codigoEmpleado" placeholder="Código empleado"><br>

      <button class="btn" onclick="registrarEmpleado()">Registrar</button>

      <p id="mensajeEmpleado"></p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Empleado</th>
          <th>Fecha</th>
          <th>Entrada</th>
          <th>Salida</th>
        </tr>
      </thead>
      <tbody id="tablaEmpleados"></tbody>
    </table>
  </div>

  <script>
    function abrir(pantalla) {
      document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
      document.getElementById(pantalla).style.display = 'block';
    }

    function volver() {
      abrir('menu');
    }

    // 🔐 LOGIN
    function login() {
      const correo = document.getElementById('correo').value;
      const password = document.getElementById('password').value;

      const usuario = JSON.parse(localStorage.getItem('usuario'));

      if (!usuario || usuario.correo !== correo || usuario.password !== password) {
        document.getElementById('mensajeLogin').innerText = 'Datos incorrectos';
        return;
      }

      abrir('menu');
    }

    // 📝 REGISTRO
    function registrarUsuario() {
      const correo = document.getElementById('nuevoCorreo').value;
      const password = document.getElementById('nuevoPassword').value;

      if (!correo || !password) {
        alert('Complete los datos');
        return;
      }

      const usuario = { correo, password };

      localStorage.setItem('usuario', JSON.stringify(usuario));

      document.getElementById('mensajeRegistro').innerText = 'Cuenta creada';

      abrir('login');
    }

    function logout() {
      abrir('login');
    }

    // 🔄 RESET DIARIO
    function verificarDia() {
      const hoy = new Date().toLocaleDateString();
      const ultimaFecha = localStorage.getItem('fechaRegistro');

      if (ultimaFecha !== hoy) {
        localStorage.removeItem('empleados');
        localStorage.setItem('fechaRegistro', hoy);
      }
    }

    // 👨‍💼 EMPLEADOS
    function registrarEmpleado() {
      verificarDia();

      const codigo = document.getElementById('codigoEmpleado').value.trim();

      if (!codigo) {
        alert('Ingrese código');
        return;
      }

      let datos = JSON.parse(localStorage.getItem('empleados')) || [];
      let empleado = datos.find(e => e.codigo === codigo);

      const fechaObj = new Date();
      const fecha = fechaObj.toLocaleDateString();
      const hora = fechaObj.toLocaleTimeString();

      if (!empleado) {
        empleado = { codigo, fecha, entrada: hora, salida: '' };
        datos.push(empleado);
      } else if (!empleado.salida) {
        empleado.salida = hora;
      } else {
        alert('Ya registró hoy');
        return;
      }

      localStorage.setItem('empleados', JSON.stringify(datos));
      document.getElementById('codigoEmpleado').value = '';

      mostrarEmpleados();
    }

    function mostrarEmpleados() {
      verificarDia();

      let datos = JSON.parse(localStorage.getItem('empleados')) || [];
      const tbody = document.getElementById('tablaEmpleados');

      tbody.innerHTML = '';

      datos.forEach(e => {
        tbody.innerHTML += `
          <tr>
            <td>${e.codigo}</td>
            <td>${e.fecha}</td>
            <td>${e.entrada}</td>
            <td>${e.salida || '-'}</td>
          </tr>
        `;
      });
    }

    mostrarEmpleados();
  </script>

</body>
</html>
